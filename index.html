<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>從零開始!在Roblox打造你的麥塊世界</title>
<style>
  :root {
    --grass:#5fbf3a;
    --grass-dark:#2f7d32;
    --dirt:#7a4b2a;
    --dirt-dark:#4b2f1a;
    --stone:#6b7280;
    --stone-dark:#374151;
    --gold:#facc15;
    --paper:#fff8dc;
    --ink:#1f2937;
    --code:#111827;
    --code-head:#2b2f36;
  }
  * { box-sizing:border-box; }
  body {
    margin:0;
    font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
    background:
      linear-gradient(45deg, rgba(95,191,58,.18) 25%, transparent 25%) 0 0/32px 32px,
      linear-gradient(45deg, transparent 75%, rgba(95,191,58,.18) 75%) 0 0/32px 32px,
      linear-gradient(135deg,#dff7ff 0%,#eef9e8 45%,#fff2d6 100%);
    color:var(--ink);
  }
  .topbar {
    background:linear-gradient(90deg,var(--grass-dark),var(--grass),var(--grass-dark));
    color:white;
    padding:14px 18px;
    border-bottom:6px solid var(--dirt);
    box-shadow:0 6px 0 var(--dirt-dark);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    flex-wrap:wrap;
  }
  .brand {
    display:flex;
    align-items:center;
    gap:12px;
    font-size:24px;
    font-weight:900;
    text-shadow:3px 3px 0 rgba(0,0,0,.35);
  }
  .cube {
    width:42px;
    height:42px;
    display:grid;
    place-items:center;
    background:linear-gradient(135deg,#74d64b 0 50%,#4ca52c 50%), var(--grass);
    border:4px solid #1f4d20;
    box-shadow:4px 4px 0 rgba(0,0,0,.35);
    color:#102a12;
    text-shadow:none;
    font-weight:900;
  }
  .collapse-btn {
    border:4px solid #1f4d20;
    background:#facc15;
    color:#1f2937;
    padding:10px 14px;
    font-weight:900;
    cursor:pointer;
    box-shadow:4px 4px 0 rgba(0,0,0,.35);
    font-family:inherit;
    font-size:16px;
  }
  .collapse-btn:hover {
    transform:translate(2px,2px);
    box-shadow:2px 2px 0 rgba(0,0,0,.35);
  }
  .layout {
    display:grid;
    grid-template-columns:310px 1fr;
    min-height:calc(100vh - 76px);
  }
  .layout.sidebar-collapsed {
    grid-template-columns:1fr;
  }
  .layout.sidebar-collapsed .sidebar {
    display:none;
  }
  .sidebar {
    background:
      linear-gradient(45deg,rgba(122,75,42,.12) 25%,transparent 25%) 0 0/20px 20px,
      #fffaf0;
    border-right:6px solid var(--dirt);
    padding:16px;
    overflow:auto;
    max-height:calc(100vh - 76px);
    position:sticky;
    top:0;
  }
  .nav-btn {
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin:10px 0;
    padding:12px;
    border:4px solid var(--stone-dark);
    background:#fef3c7;
    color:#1f2937;
    font-weight:900;
    cursor:pointer;
    text-align:left;
    box-shadow:4px 4px 0 rgba(0,0,0,.22);
    border-radius:0;
  }
  .nav-btn:hover,.nav-btn.active {
    background:#bbf7d0;
    border-color:#14532d;
    transform:translate(2px,2px);
    box-shadow:2px 2px 0 rgba(0,0,0,.22);
  }
  .nav-left {
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
  }
  .nav-num {
    width:30px;
    height:30px;
    display:grid;
    place-items:center;
    background:var(--stone-dark);
    color:white;
    border:3px solid #111827;
    flex-shrink:0;
    font-size:13px;
  }
  .nav-text {
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
  }
  .content { padding:22px; }
  .card {
    background:var(--paper);
    border:6px solid var(--dirt);
    box-shadow:8px 8px 0 rgba(75,47,26,.38);
    overflow:hidden;
    margin-bottom:20px;
  }
  .lesson-body {
    padding:24px;
    background:
      linear-gradient(45deg,rgba(255,255,255,.35) 25%,transparent 25%) 0 0/18px 18px,
      var(--paper);
  }
  .lesson-body h2 {
    margin:0 0 18px;
    font-size:32px;
    color:#111827;
    text-shadow:2px 2px 0 #facc15;
  }
  .lesson-body p {
    line-height:2;
    white-space:pre-wrap;
    color:#334155;
    font-size:21px;
    font-weight:600;
  }
  .section-label {
    font-weight:900;
    color:#111827;
    font-size:23px;
  }
  .meta {
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:16px;
  }
  .tag {
    padding:9px 13px;
    background:#e5e7eb;
    border:3px solid var(--stone-dark);
    font-size:14px;
    font-weight:900;
    color:#111827;
    box-shadow:3px 3px 0 rgba(0,0,0,.16);
  }
  .code-head {
    background:var(--code-head);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    padding:14px 16px;
    flex-wrap:wrap;
    border-top:6px solid var(--stone-dark);
    border-bottom:4px solid #111827;
  }
  .copy-btn {
    border:3px solid #14532d;
    background:#22c55e;
    color:#052e16;
    padding:9px 13px;
    font-weight:900;
    cursor:pointer;
    box-shadow:3px 3px 0 rgba(0,0,0,.3);
  }
  .copy-btn:hover {
    transform:translate(2px,2px);
    box-shadow:1px 1px 0 rgba(0,0,0,.3);
  }
  .code-wrap {
    margin:0;
    background:var(--code);
    color:#e5e7eb;
    overflow:auto;
    max-height:760px;
    border-top:4px solid #000;
    font-family:Consolas,Monaco,"Courier New",monospace;
    font-size:14px;
    line-height:1.65;
  }
  .code-line {
    display:grid;
    grid-template-columns:58px 1fr;
    min-width:max-content;
  }
  .line-no {
    user-select:none;
    text-align:right;
    padding:0 12px 0 8px;
    color:#9ca3af;
    background:#020617;
    border-right:2px solid #374151;
  }
  .line-code {
    white-space:pre;
    padding:0 18px;
  }
  .code-line:nth-child(even) .line-code {
    background:rgba(255,255,255,0.025);
  }
  .footer {
    text-align:center;
    color:#4b5563;
    padding:20px;
    font-size:14px;
    font-weight:800;
  }
  @media(max-width:860px) {
    .layout { grid-template-columns:1fr; }
    .sidebar {
      display:block;
      border-right:0;
      border-bottom:6px solid var(--dirt);
      max-height:none;
      position:relative;
    }
    .layout.sidebar-collapsed .sidebar { display:none; }
    .content { padding:14px; }
    .brand { font-size:20px; }
    .collapse-btn { width:100%; font-size:15px; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="cube">R</div>
      <div>從零開始!在Roblox打造你的麥塊世界</div>
    </div>
    <button class="collapse-btn" onclick="toggleSidebar()">☰ 收合選單</button>
  </header>

  <div class="layout" id="mainLayout">
    <aside class="sidebar" id="sidebar">
      <div id="menu"></div>
    </aside>

    <main class="content">
      <section class="card">
        <div class="lesson-body">
          <h2 id="lessonTitle"></h2>
          <p id="lessonDescription"></p>
          <div class="meta">
            <span class="tag" id="lessonPlace"></span>
            <span class="tag" id="lessonType"></span>
          </div>
        </div>

        <div class="code-head">
          <strong id="codeTitle">程式碼</strong>
          <button class="copy-btn" onclick="copyCurrentCode()">複製程式碼</button>
        </div>
        <div class="code-wrap" id="lessonCode"></div>
      </section>

      <div class="footer">社團法人台灣資訊教育發展協會</div>
    </main>
  </div>
</div>

<script>
const lessons = [{"title": "6-1創世神之手", "place": "放置位置：StarterPack > 創世神之手 Tool 內", "type": "類型：LocalScript", "purpose": "讓玩家選擇方塊並放置方塊，搭配 RemoteEvent 由伺服器生成。", "code": "local player = game.Players.LocalPlayer\nlocal playerGui = player:WaitForChild(\"PlayerGui\")\nlocal mouse = player:GetMouse()\nlocal tool = script.Parent\nlocal runService = game:GetService(\"RunService\")\nlocal UIS = game:GetService(\"UserInputService\")\nlocal ReplicatedStorage = game:GetService(\"ReplicatedStorage\")\nlocal placeEvent = ReplicatedStorage:WaitForChild(\"MinebloxEvents\"):WaitForChild(\"PlaceBlockEvent\")\n\n-- 限制放置距離：8 格方塊 (8 * 4 = 32 單位)\nlocal MAX_DIST = 32 \n\n-- ⭐ 完整的 50 種方塊資料庫\nlocal blockData = {\n        {name = \"草地\", mat = Enum.Material.Grass, color = BrickColor.new(\"Bright green\")},\n        {name = \"泥土\", mat = Enum.Material.Mud, color = BrickColor.new(\"Dirt brown\")},\n        {name = \"石頭\", mat = Enum.Material.Concrete, color = BrickColor.new(\"Medium stone grey\")},\n        {name = \"鵝卵石\", mat = Enum.Material.Cobblestone, color = BrickColor.new(\"Dark stone grey\")},\n        {name = \"木板\", mat = Enum.Material.WoodPlanks, color = BrickColor.new(\"Burnt Sienna\")},\n        {name = \"原木\", mat = Enum.Material.Wood, color = BrickColor.new(\"Brown\")},\n        {name = \"磚塊\", mat = Enum.Material.Brick, color = BrickColor.new(\"Terra Cotta\")},\n        {name = \"石磚\", mat = Enum.Material.Pavement, color = BrickColor.new(\"Medium stone grey\")},\n        {name = \"沙子\", mat = Enum.Material.Sand, color = BrickColor.new(\"Cool yellow\")},\n        {name = \"沙岩\", mat = Enum.Material.Sandstone, color = BrickColor.new(\"Brick yellow\")},\n        {name = \"玻璃\", mat = Enum.Material.Glass, color = BrickColor.new(\"Institutional white\"), trans = 0.6},\n        {name = \"黑玻璃\", mat = Enum.Material.Glass, color = BrickColor.new(\"Black\"), trans = 0.5},\n        {name = \"雪塊\", mat = Enum.Material.Sand, color = BrickColor.new(\"White\")},\n        {name = \"冰塊\", mat = Enum.Material.Ice, color = BrickColor.new(\"Pastel blue\"), trans = 0.5},\n        {name = \"鐵礦\", mat = Enum.Material.Slate, color = BrickColor.new(\"Light stone grey\")},\n        {name = \"金塊\", mat = Enum.Material.Metal, color = BrickColor.new(\"Bright yellow\")},\n        {name = \"鑽石塊\", mat = Enum.Material.Foil, color = BrickColor.new(\"Cyan\")},\n        {name = \"黑曜石\", mat = Enum.Material.Basalt, color = BrickColor.new(\"Really black\")},\n        {name = \"地獄石\", mat = Enum.Material.Cobblestone, color = BrickColor.new(\"Dark red\")},\n        {name = \"史萊姆\", mat = Enum.Material.SmoothPlastic, color = BrickColor.new(\"Lime green\"), trans = 0.3},\n        {name = \"白羊毛\", mat = Enum.Material.Fabric, color = BrickColor.new(\"White\")},\n        {name = \"黑羊毛\", mat = Enum.Material.Fabric, color = BrickColor.new(\"Really black\")},\n        {name = \"紅羊毛\", mat = Enum.Material.Fabric, color = BrickColor.new(\"Bright red\")},\n        {name = \"藍羊毛\", mat = Enum.Material.Fabric, color = BrickColor.new(\"Bright blue\")},\n        {name = \"綠羊毛\", mat = Enum.Material.Fabric, color = BrickColor.new(\"Dark green\")},\n        {name = \"黃羊毛\", mat = Enum.Material.Fabric, color = BrickColor.new(\"Bright yellow\")},\n        {name = \"紫羊毛\", mat = Enum.Material.Fabric, color = BrickColor.new(\"Royal purple\")},\n        {name = \"粉羊毛\", mat = Enum.Material.Fabric, color = BrickColor.new(\"Carnation pink\")},\n        {name = \"橘羊毛\", mat = Enum.Material.Fabric, color = BrickColor.new(\"Deep orange\")},\n        {name = \"青羊毛\", mat = Enum.Material.Fabric, color = BrickColor.new(\"Cyan\")},\n        {name = \"白螢光\", mat = Enum.Material.Neon, color = BrickColor.new(\"White\")},\n        {name = \"黃螢光\", mat = Enum.Material.Neon, color = BrickColor.new(\"New Yeller\")},\n        {name = \"紅螢光\", mat = Enum.Material.Neon, color = BrickColor.new(\"Really red\")},\n        {name = \"藍螢光\", mat = Enum.Material.Neon, color = BrickColor.new(\"Really blue\")},\n        {name = \"綠螢光\", mat = Enum.Material.Neon, color = BrickColor.new(\"Lime green\")},\n        {name = \"紫螢光\", mat = Enum.Material.Neon, color = BrickColor.new(\"Magenta\")},\n        {name = \"橘螢光\", mat = Enum.Material.Neon, color = BrickColor.new(\"Neon orange\")},\n        {name = \"粉螢光\", mat = Enum.Material.Neon, color = BrickColor.new(\"Hot pink\")},\n        {name = \"青螢光\", mat = Enum.Material.Neon, color = BrickColor.new(\"Toothpaste\")},\n        {name = \"力場\", mat = Enum.Material.ForceField, color = BrickColor.new(\"Cyan\"), trans = 0.2},\n        {name = \"花崗岩\", mat = Enum.Material.Granite, color = BrickColor.new(\"Dark stone grey\")},\n        {name = \"大理石\", mat = Enum.Material.Marble, color = BrickColor.new(\"Institutional white\")},\n        {name = \"碎石\", mat = Enum.Material.Pebble, color = BrickColor.new(\"Medium stone grey\")},\n        {name = \"鏽鐵\", mat = Enum.Material.CorrodedMetal, color = BrickColor.new(\"Brown\")},\n        {name = \"鋼板\", mat = Enum.Material.DiamondPlate, color = BrickColor.new(\"Dark stone grey\")},\n        {name = \"柏油路\", mat = Enum.Material.Asphalt, color = BrickColor.new(\"Really black\")},\n        {name = \"鹽塊\", mat = Enum.Material.Salt, color = BrickColor.new(\"Pastel light blue\")},\n        {name = \"冰川\", mat = Enum.Material.Glacier, color = BrickColor.new(\"Cyan\")},\n        {name = \"紅塑膠\", mat = Enum.Material.SmoothPlastic, color = BrickColor.new(\"Really red\")},\n        {name = \"藍塑膠\", mat = Enum.Material.SmoothPlastic, color = BrickColor.new(\"Really blue\")},\n}\n\nlocal selectedIndex = 1\nlocal ghostBlock = nil\nlocal gui = nil \nlocal isEquipped = false\nlocal clickConnection = nil \nlocal touchConnection = nil -- 負責管理手機的連線\n\n-- 建立預覽的半透明虛擬方塊\nlocal function createGhost()\n        if ghostBlock then ghostBlock:Destroy() end\n        local data = blockData[selectedIndex]\n        ghostBlock = Instance.new(\"Part\")\n        ghostBlock.Name = \"PreviewGhost\"\n        ghostBlock.Size = Vector3.new(4, 4, 4)\n        ghostBlock.Anchored = true\n        ghostBlock.CanCollide = false\n        ghostBlock.CanQuery = false\n        ghostBlock.Transparency = 1 \n        ghostBlock.Material = data.mat\n        ghostBlock.BrickColor = data.color\n        ghostBlock.Parent = workspace\n        mouse.TargetFilter = ghostBlock\nend\n\n-- 建立方塊選單 UI 介面\nlocal function createGui()\n        if gui then gui:Destroy() end\n        gui = Instance.new(\"ScreenGui\") \n        gui.Name = \"PlaceGui\" \n        gui.Parent = playerGui\n\n        local sf = Instance.new(\"ScrollingFrame\")\n        sf.Active = true \n        sf.Size = UDim2.new(0, 160, 0, 420)\n        sf.Position = UDim2.new(1, -170, 0.5, -210)\n        sf.BackgroundColor3 = Color3.new(0.15, 0.15, 0.15)\n        sf.BackgroundTransparency = 0.2\n        sf.BorderSizePixel = 0\n        sf.CanvasSize = UDim2.new(0, 0, 0, #blockData * 45 + 10)\n        sf.ScrollBarThickness = 8\n        sf.Parent = gui\n\n        local layout = Instance.new(\"UIListLayout\")\n        layout.Padding = UDim.new(0, 5)\n        layout.HorizontalAlignment = Enum.HorizontalAlignment.Center\n        layout.Parent = sf\n        Instance.new(\"UIPadding\", sf).PaddingTop = UDim.new(0, 5)\n\n        for i, data in ipairs(blockData) do\n                local btn = Instance.new(\"TextButton\")\n                btn.Size = UDim2.new(0, 130, 0, 40)\n                btn.Text = data.name\n                btn.Font = Enum.Font.SourceSansBold\n                btn.TextSize = 20\n                btn.BackgroundColor3 = data.color.Color\n                btn.TextColor3 = Color3.new(1, 1, 1)\n                btn.Parent = sf\n\n                local stroke = Instance.new(\"UIStroke\")\n                stroke.Thickness = 1.5\n                stroke.Parent = btn\n                Instance.new(\"UICorner\", btn).CornerRadius = UDim.new(0, 5)\n\n                btn.MouseButton1Click:Connect(function() \n                        selectedIndex = i \n                        createGhost() \n                end)\n        end\nend\n\n-- 每幀持續更新虛擬預覽方塊的位置\nrunService.RenderStepped:Connect(function()\n        if not ghostBlock or not isEquipped then \n                if ghostBlock then ghostBlock.Transparency = 1 end \n                return \n        end\n\n        -- 手機平板自動隱藏虛影，避免畫面干擾\n        local lastInput = UIS:GetLastInputType()\n        if lastInput == Enum.UserInputType.Touch then\n                ghostBlock.Transparency = 1\n                return\n        end\n\n        -- 電腦版滑鼠更新邏輯\n        local root = player.Character and player.Character:FindFirstChild(\"HumanoidRootPart\")\n        if not root then return end\n\n        if (root.Position - mouse.Hit.Position).Magnitude > MAX_DIST then \n                ghostBlock.Transparency = 1 \n        else\n                local data = blockData[selectedIndex]\n                ghostBlock.Transparency = data.trans or 0.5\n                if mouse.Target then\n                        local pos = mouse.Hit.Position\n                        if mouse.Target.Name == \"Baseplate\" then \n                                ghostBlock.Position = Vector3.new(math.round(pos.X/4)*4, 2, math.round(pos.Z/4)*4)\n                        else\n                                local s = mouse.TargetSurface\n                                local off = Vector3.new(0, 0, 0)\n                                if s == Enum.NormalId.Top then off = Vector3.new(0, 4, 0) \n                                elseif s == Enum.NormalId.Bottom then off = Vector3.new(0, -4, 0)\n                                elseif s == Enum.NormalId.Right then off = Vector3.new(4, 0, 0) \n                                elseif s == Enum.NormalId.Left then off = Vector3.new(-4, 0, 0)\n                                elseif s == Enum.NormalId.Front then off = Vector3.new(0, 0, -4) \n                                elseif s == Enum.NormalId.Back then off = Vector3.new(0, 0, 4) end\n                                ghostBlock.Position = mouse.Target.Position + off\n                        end\n                end\n        end\nend)\n\n-- ⭐ 【全新進化】雙核心放置邏輯功能函數\nlocal function handlePlacement(touchPos)\n        local targetPart, hitPos, normalOff\n\n        -- 判斷是手機觸控(有傳入座標) 還是電腦滑鼠(沒傳座標)\n        if touchPos then\n                -- 📱 【手機版魔法】：射線檢測 (Raycasting)\n                -- 從攝影機朝著手指點擊的位置發射一道隱形雷射\n                local camera = workspace.CurrentCamera\n                local ray = camera:ViewportPointToRay(touchPos.X, touchPos.Y)\n                local params = RaycastParams.new()\n                params.FilterType = Enum.RaycastFilterType.Exclude\n\n                -- 告訴雷射光忽略玩家自己和虛影，直接打在建築物上\n                local ignoreList = {}\n                if ghostBlock then table.insert(ignoreList, ghostBlock) end\n                if player.Character then table.insert(ignoreList, player.Character) end\n                params.FilterDescendantsInstances = ignoreList\n\n                -- 發射雷射尋找打中了什麼方塊\n                local result = workspace:Raycast(ray.Origin, ray.Direction * 1000, params)\n                if not result then return end -- 沒打中方塊就結束\n\n                targetPart = result.Instance\n                hitPos = result.Position\n                normalOff = result.Normal * 4 -- 利用法線向量精準算出方塊該疊加在哪個面上\n        else\n                -- 💻 【電腦版】：直接讀取滑鼠\n                targetPart = mouse.Target\n                hitPos = mouse.Hit.Position\n                if not targetPart then return end\n\n                local s = mouse.TargetSurface\n                if s == Enum.NormalId.Top then normalOff = Vector3.new(0, 4, 0) \n                elseif s == Enum.NormalId.Bottom then normalOff = Vector3.new(0, -4, 0)\n                elseif s == Enum.NormalId.Right then normalOff = Vector3.new(4, 0, 0) \n                elseif s == Enum.NormalId.Left then normalOff = Vector3.new(-4, 0, 0)\n                elseif s == Enum.NormalId.Front then normalOff = Vector3.new(0, 0, -4) \n                elseif s == Enum.NormalId.Back then normalOff = Vector3.new(0, 0, 4) \n                else normalOff = Vector3.new(0, 4, 0) end\n        end\n\n        -- 計算距離並呼叫對講機蓋房子\n        local root = player.Character and player.Character:FindFirstChild(\"HumanoidRootPart\")\n        if root and (root.Position - hitPos).Magnitude <= MAX_DIST then\n                local data = blockData[selectedIndex]\n                local finalPos = Vector3.new(0,0,0)\n\n                if targetPart.Name == \"Baseplate\" then\n                        finalPos = Vector3.new(math.round(hitPos.X/4)*4, 2, math.round(hitPos.Z/4)*4)\n                else\n                        finalPos = targetPart.Position + normalOff\n                end\n\n                placeEvent:FireServer(finalPos, data.mat, data.color, data.trans)\n        end\nend\n\n-- 裝備與收起工具的事件\ntool.Equipped:Connect(function() \n        isEquipped = true\n        createGui() \n        createGhost() \n\n        -- 💻 綁定電腦端：監聽滑鼠點擊\n        clickConnection = mouse.Button1Down:Connect(function()\n                -- 防 UI 穿透機制\n                local guiObjects = playerGui:GetGuiObjectsAtPosition(mouse.X, mouse.Y)\n                for _, obj in ipairs(guiObjects) do\n                        if obj:IsDescendantOf(gui) or obj:IsDescendantOf(playerGui:FindFirstChild(\"MainUIGui\")) then\n                                return \n                        end\n                end\n                handlePlacement(nil) -- nil 代表沒有觸控座標，使用滑鼠\n        end)\n\n        -- 📱 綁定手機端：監聽 3D 世界「輕觸 (TouchTap)」\n        touchConnection = UIS.TouchTapInWorld:Connect(function(position, processedByUI)\n                -- processedByUI 會自動幫我們過濾掉所有按鈕的誤觸！\n                if not isEquipped or processedByUI then return end\n                handlePlacement(position) -- 把手指點擊的螢幕座標傳進去發射雷射\n        end)\nend)\n\ntool.Unequipped:Connect(function() \n        isEquipped = false\n        if gui then gui:Destroy() gui = nil end \n        if ghostBlock then ghostBlock:Destroy() ghostBlock = nil end \n               else currentEditTarget = \"X\" toggleBtn.Text = \"設定部位: 寬(X)左右牆\" displayZ.TextColor3,\n                        displayX.TextColor3 = Color3.new(1,1,1), Color3.new(1,0.8,0) end\n        end)\n\n        local scrollFrame = Instance.new(\"ScrollingFrame\")\n        scrollFrame.Active = true -- ⭐ 【關鍵修復】\n        scrollFrame.Size, scrollFrame.Position, scrollFrame.BackgroundColor3, scrollFrame.BackgroundTransparency,\n        scrollFrame.BorderSizePixel, scrollFrame.CanvasSize, scrollFrame.ScrollBarThickness, \n        scrollFrame.Parent = UDim2.new(0.9,0,0,250), UDim2.new(0.05,0,0,260), Color3.new(0.1,0.1,0.1), 0.5, 0, UDim2.new(0,0,0,#blockData*35+5), 6, frame\n        Instance.new(\"UICorner\", scrollFrame).CornerRadius = UDim.new(0, 5)\n        local listLayout = Instance.new(\"UIListLayout\") listLayout.Padding, \n        listLayout.HorizontalAlignment, listLayout.SortOrder, listLayout.Parent = UDim.new(0,5),\n        Enum.HorizontalAlignment.Center, Enum.SortOrder.LayoutOrder, scrollFrame\n        Instance.new(\"UIPadding\", scrollFrame).PaddingTop = UDim.new(0, 5)\n\n        for i, data in ipairs(blockData) do\n                local btn = Instance.new(\"TextButton\") btn.Size, btn.Text, btn.Font, btn.TextSize,\n                btn.BackgroundColor3, btn.TextColor3, btn.LayoutOrder, btn.Parent = UDim2.new(0,180,0,30), \n                data.name, Enum.Font.SourceSansBold, 18, data.color.Color, Color3.new(1,1,1), i, scrollFrame\n                local stroke = Instance.new(\"UIStroke\") stroke.Thickness, stroke.Parent = 1.5, btn\n                Instance.new(\"UICorner\", btn).CornerRadius = UDim.new(0, 5)\n                btn.MouseButton1Click:Connect(function()\n                        if currentEditTarget == \"X\" then matXIndex = i displayX.Text = \"寬(X) 左右牆: \" .. data.name\n                        elseif currentEditTarget == \"Y\" then matYIndex = i displayY.Text = \"高(Y) 天花板/地板: \" .. data.name\n                        elseif currentEditTarget == \"Z\" then matZIndex = i displayZ.Text = \"長(Z) 前後牆: \" .. data.name end\n                end)\n        end\nend\n\nlocal function handleBuild()\n        local target = mouse.Target\n        if not target then return end\n\n        local char = player.Character\n        local root = char and char:FindFirstChild(\"HumanoidRootPart\")\n        if not root then return end\n\n        local startPos = mouse.Hit.Position\n        if (root.Position - startPos).Magnitude > MAX_DIST then return end\n\n        local gridX = math.round(startPos.X / 4) * 4\n        local gridY = 2 \n        local gridZ = math.round(startPos.Z / 4) * 4\n        if target.Name ~= \"Baseplate\" then gridY = target.Position.Y + 4 end\n\n        local dataX, dataY, dataZ = blockData[matXIndex], blockData[matYIndex], blockData[matZIndex]\n        local packX = {mat = dataX.mat, colorName = dataX.color.Name, trans = dataX.trans}\n        local packY = {mat = dataY.mat, colorName = dataY.color.Name, trans = dataY.trans}\n        local packZ = {mat = dataZ.mat, colorName = dataZ.color.Name, trans = dataZ.trans}\n\n        buildEvent:FireServer(gridX, gridY, gridZ, sizeX, sizeY, sizeZ, packX, packY, packZ)\nend\n\ntool.Equipped:Connect(function()\n        isEquipped = true\n        createGui()\nend)\n\ntool.Unequipped:Connect(function() \n        isEquipped = false\n        if gui then gui:Destroy() gui = nil end \nend)\n\n-- ⭐ 【跨平台核心】自動過濾介面點擊，完美支援手機手指觸控\nUIS.InputBegan:Connect(function(input, processed)\n        if not isEquipped then return end\n        if processed then return end \n\n        if input.UserInputType == Enum.UserInputType.MouseButton1 or input.UserInputType == Enum.UserInputType.Touch then\n                task.wait(0.05) \n                handleBuild()\n        end\nend)"}, {"title": "7-2 炸彈製作", "place": "放置位置：StarterPack > 炸彈 Tool 內", "type": "類型：LocalScript", "purpose": "讓玩家在指定位置放置炸彈，並透過 RemoteEvent 交由伺服器產生炸彈與爆炸效果。", "code": "local player = game.Players.LocalPlayer\nlocal mouse = player:GetMouse()\nlocal tool = script.Parent\n\n-- ⭐ 限制放置炸彈距離為 8 格方塊 (8 * 4 = 32 單位)\nlocal MAX_DIST = 32 \n\n-- ⭐ 取得伺服器對講機\nlocal ReplicatedStorage = game:GetService(\"ReplicatedStorage\")\nlocal bombEvent = ReplicatedStorage:WaitForChild(\"MinebloxEvents\"):WaitForChild(\"SpawnBombEvent\")\n\n-- 放置炸彈的邏輯\ntool.Activated:Connect(function()\n\tlocal target = mouse.Target\n\tif not target then return end\n\n\t-- 尋找玩家身體並計算距離\n\tlocal char = player.Character\n\tlocal root = char and char:FindFirstChild(\"HumanoidRootPart\")\n\tif not root then return end\n\n\tlocal dist = (root.Position - mouse.Hit.Position).Magnitude\n\n\t-- 距離判斷：如果超過 32 單位 (8格)，就不允許放置炸彈\n\tif dist > MAX_DIST then\n\t\treturn \n\tend\n\n\t-- 計算網格對齊的座標\n\tlocal pos = mouse.Hit.Position\n\tlocal offset = Vector3.new(0, 0, 0)\n\tlocal finalPos = Vector3.new(0,0,0)\n\n\tif target.Name == \"Baseplate\" then\n\t\tfinalPos = Vector3.new(math.round(pos.X/4)*4, 2, math.round(pos.Z/4)*4)\n\telse\n\t\tlocal side = mouse.TargetSurface\n\t\tif side == Enum.NormalId.Top then offset = Vector3.new(0, 4, 0)\n\t\telseif side == Enum.NormalId.Bottom then offset = Vector3.new(0, -4, 0)\n\t\telseif side == Enum.NormalId.Right then offset = Vector3.new(4, 0, 0)\n\t\telseif side == Enum.NormalId.Left then offset = Vector3.new(-4, 0, 0)\n\t\telseif side == Enum.NormalId.Front then offset = Vector3.new(0, 0, -4)\n\t\telseif side == Enum.NormalId.Back then offset = Vector3.new(0, 0, 4)\n\t\tend\n\t\tfinalPos = target.Position + offset\n\tend\n\n\t-- ⭐ 關鍵修改：將計算好的座標告訴伺服器，讓伺服器產生炸彈並執行倒數爆炸\n\tbombEvent:FireServer(finalPos)\nend)"}, {"title": "8-2 MinebloxServer", "place": "放置位置：ServerScriptService", "type": "類型：Script", "purpose": "伺服器主程式，負責同步放置方塊、破壞方塊、建造房屋與炸彈爆炸。", "code": "-- =========================================================\n-- Mineblox 伺服器主程式 (Server Script)\n-- 放置位置: ServerScriptService\n-- 功能: 接收所有玩家的工具請求，並同步到全伺服器\n-- =========================================================\n\nlocal ReplicatedStorage = game:GetService(\"ReplicatedStorage\")\nlocal events = ReplicatedStorage:WaitForChild(\"MinebloxEvents\")\n\n-- 取得四個連線事件對講機\nlocal placeEvent = events:WaitForChild(\"PlaceBlockEvent\")\nlocal breakEvent = events:WaitForChild(\"BreakBlockEvent\")\nlocal buildEvent = events:WaitForChild(\"BuildHouseEvent\")\nlocal bombEvent = events:WaitForChild(\"SpawnBombEvent\")\n\n-----------------------------------------------------------\n-- 1. 創世神之手：伺服器生成單一方塊\n-----------------------------------------------------------\nplaceEvent.OnServerEvent:Connect(function(player, pos, mat, color, trans)\n        -- 伺服器端負責把方塊生出來，這樣所有人都看得到\n        local realBlock = Instance.new(\"Part\")\n        realBlock.Size = Vector3.new(4, 4, 4)\n        realBlock.Position = pos\n        realBlock.Anchored = true\n        realBlock.Material = mat\n        realBlock.BrickColor = color\n        if trans then realBlock.Transparency = trans end\n        realBlock.Parent = game.Workspace\nend)\n\n-----------------------------------------------------------\n-- 2. 鎬子：伺服器刪除方塊\n-----------------------------------------------------------\nbreakEvent.OnServerEvent:Connect(function(player, targetPart)\n        -- 確保方塊還存在才刪除\n        if targetPart and targetPart.Parent then\n                targetPart:Destroy()\n\n                -- ⭐ 關鍵修正：在伺服器端給予積分，這樣交易系統才抓得到這筆錢！\n                local leaderstats = player:FindFirstChild(\"leaderstats\")\n                if leaderstats then\n                        local points = leaderstats:FindFirstChild(\"方塊積分\")\n                        if points then\n                                points.Value += 1\n                        end\n                end\n        end\nend)\n\n-----------------------------------------------------------\n-- 3. 建造器：伺服器執行龐大建築迴圈\n-----------------------------------------------------------\nbuildEvent.OnServerEvent:Connect(function(player, gridX, gridY, gridZ, sizeX, sizeY, sizeZ, packX, packY, packZ)\n        local houseFolder = Instance.new(\"Folder\")\n        houseFolder.Name = \"CustomHouse_\" .. player.Name\n        houseFolder.Parent = game.Workspace\n\n        local minX, maxX = math.floor(-sizeX / 2), math.floor(-sizeX / 2) + sizeX - 1\n        local minY, maxY = 0, sizeY - 1\n        local minZ, maxZ = math.floor(-sizeZ / 2), math.floor(-sizeZ / 2) + sizeZ - 1\n        local blocksGenerated = 0 \n\n        for x = minX, maxX do\n                for y = minY, maxY do\n                        for z = minZ, maxZ do\n                                local isOuterShell = (x == minX or x == maxX or y == minY or y == maxY or z == minZ or z == maxZ)\n\n                                if isOuterShell then\n                                        -- 預留門口\n                                        if z == maxZ and (x == 0 or x == 1) and y < 2 then continue end\n\n                                        local block = Instance.new(\"Part\")\n                                        block.Size = Vector3.new(4, 4, 4)\n                                        block.Position = Vector3.new(gridX + (x * 4), gridY + (y * 4), gridZ + (z * 4))\n                                        block.Anchored = true\n\n                                        -- 根據傳來的參數設定三軸材質與顏色\n                                        if y == minY or y == maxY then\n                                                block.Material = packY.mat\n                                                block.BrickColor = BrickColor.new(packY.colorName)\n                                                if packY.trans then block.Transparency = packY.trans end\n                                        elseif x == minX or x == maxX then\n                                                block.Material = packX.mat\n                                                block.BrickColor = BrickColor.new(packX.colorName)\n                                                if packX.trans then block.Transparency = packX.trans end\n                                        elseif z == minZ or z == maxZ then\n                                                block.Material = packZ.mat\n                                                block.BrickColor = BrickColor.new(packZ.colorName)\n                                                if packZ.trans then block.Transparency = packZ.trans end\n                                        end\n\n                                        block.Parent = houseFolder\n\n                                        -- 伺服器防當機機制\n                                        blocksGenerated += 1\n                                        if blocksGenerated % 500 == 0 then task.wait() end\n                                end\n                        end\n                end\n        end\nend)\n\n-----------------------------------------------------------\n-- 4. 炸彈：伺服器爆炸邏輯與物理模擬\n-----------------------------------------------------------\nlocal blastRadius = 16 \n\nlocal function triggerExplosion(position)\n        local explosion = Instance.new(\"Explosion\")\n        explosion.Position = position\n        explosion.BlastRadius = blastRadius\n        explosion.DestroyJointRadiusPercent = 0 \n        explosion.ExplosionType = Enum.ExplosionType.NoCraters\n        explosion.Parent = game.Workspace\n\n        -- 取得範圍內所有物件\n        local params = OverlapParams.new()\n        local hitParts = workspace:GetPartBoundsInRadius(position, blastRadius, params)\n        local hitPlayers = {} \n\n        for _, part in ipairs(hitParts) do\n                -- 【直擊傷害】：伺服器統一扣血，防止作弊\n                local character = part.Parent\n                if character then\n                        local humanoid = character:FindFirstChild(\"Humanoid\")\n                        if humanoid and not hitPlayers[humanoid] then\n                                hitPlayers[humanoid] = true\n                                humanoid:TakeDamage(50) \n                        end\n                end\n\n                if part.Name ~= \"Baseplate\" then\n                        -- 【連鎖反應】：引爆別顆炸彈\n                        if part.Name == \"ArmedTNT\" then\n                                part.Name = \"DetonatingTNT\" \n                                task.delay(0.2, function()\n                                        local tntPos = part.Position\n                                        if part then part:Destroy() end\n                                        triggerExplosion(tntPos)\n                                end)\n\n                                -- 【物理炸飛】：讓所有玩家看到方塊飛出去\n                        elseif part.Size == Vector3.new(4, 4, 4) and not part:FindFirstChild(\"Destroying\") then\n                                local tag = Instance.new(\"BoolValue\")\n                                tag.Name = \"Destroying\"\n                                tag.Parent = part\n\n                                part.Anchored = false -- 解除固定\n\n                                local direction = (part.Position - position).Unit\n                                if direction.Magnitude == 0 then direction = Vector3.new(0, 1, 0) end\n\n                                local force = math.random(80, 150)\n                                local upForce = math.random(50, 100)\n                                part.AssemblyLinearVelocity = direction * force + Vector3.new(0, upForce, 0)\n                                part.AssemblyAngularVelocity = Vector3.new(math.random(-30, 30), math.random(-30, 30), math.random(-30, 30))\n\n                                -- 被炸飛的殘骸砸到人會扣血\n                                local canDamage = true\n                                part.Touched:Connect(function(hit)\n                                        if not canDamage then return end\n                                        if part.AssemblyLinearVelocity.Magnitude > 20 then\n                                                local hitChar = hit.Parent\n                                                local hitHum = hitChar and hitChar:FindFirstChild(\"Humanoid\")\n                                                if hitHum then\n                                                        hitHum:TakeDamage(20)\n                                                        canDamage = false \n                                                end\n                                        end\n                                end)\n\n                                -- 1秒後撕下防重複標籤，允許殘骸二次炸飛\n                                task.delay(1, function()\n                                        if part and part:FindFirstChild(\"Destroying\") then part.Destroying:Destroy() end\n                                end)\n                        end\n                end\n        end\nend\n\n-- 接收玩家放炸彈的請求\nbombEvent.OnServerEvent:Connect(function(player, pos)\n        -- 伺服器生成未爆彈\n        local tnt = Instance.new(\"Part\")\n        tnt.Name = \"ArmedTNT\"\n        tnt.Size = Vector3.new(4, 4, 4)\n        tnt.Position = pos\n        tnt.Anchored = true\n        tnt.Material = Enum.Material.Neon\n        tnt.BrickColor = BrickColor.new(\"Really red\")\n        tnt.Parent = game.Workspace\n\n        -- 伺服器執行倒數閃爍並引爆\n        task.spawn(function()\n                for i = 1, 4 do\n                        tnt.BrickColor = BrickColor.new(\"Institutional white\")\n                        task.wait(0.25)\n                        if not tnt.Parent then return end \n                        tnt.BrickColor = BrickColor.new(\"Really red\")\n                        task.wait(0.25)\n                        if not tnt.Parent then return end\n                end\n\n                if tnt.Name == \"ArmedTNT\" then\n                        local finalPos = tnt.Position\n                        tnt:Destroy()\n                        triggerExplosion(finalPos)\n                end\n        end)\nend)"}, {"title": "8-2 交易系統", "place": "放置位置：ServerScriptService", "type": "類型：Script", "purpose": "建立玩家方塊積分資料，提供交易與商店消費使用。", "code": "game.Players.PlayerAdded:Connect(function(player)\n        local leaderstats = Instance.new(\"Folder\")\n        leaderstats.Name = \"leaderstats\"\n        leaderstats.Parent = player\n\n        local blocks = Instance.new(\"IntValue\")\n        blocks.Name = \"方塊積分\" -- 右上角顯示的名字\n        blocks.Value = 0\n        blocks.Parent = leaderstats\nend)"}, {"title": "8-3 方塊收集", "place": "放置位置：StarterGui > 方塊收集文字 Label 內", "type": "類型：LocalScript", "purpose": "讀取玩家 leaderstats 的方塊積分，並即時更新畫面上的已收集方塊數量。", "code": "local player = game.Players.LocalPlayer\nlocal label = script.Parent\n\n-- 等待 leaderstats 載入完成\nlocal leaderstats = player:WaitForChild(\"leaderstats\")\nlocal blocks = leaderstats:WaitForChild(\"方塊積分\")\n\n-- 1. 定義更新函數\nlocal function updateText()\n        label.Text = \"已收集方塊: \" .. blocks.Value\n\n        -- 增加一個小動畫：數字變動時閃一下黃色\n        label.TextColor3 = Color3.fromRGB(255, 255, 0)\n        task.wait(0.1)\n        label.TextColor3 = Color3.fromRGB(255, 255, 255)\nend\n\n-- 2. 監聽數值改變事件 (Changed)\nblocks.Changed:Connect(updateText)\n\n-- 3. 初始執行一次，確保進遊戲時數字正確\nupdateText()"}, {"title": "8-4 加速程式", "place": "放置位置：TextButton 按鈕內", "type": "類型：LocalScript", "purpose": "玩家消耗方塊積分後，短時間提高移動速度。", "code": "local button = script.Parent\nlocal player = game.Players.LocalPlayer\nlocal TweenService = game:GetService(\"TweenService\")\n\n-- 初始化設定\nlocal price = 10\nlocal duration = 10 -- 持續時間改為 10秒\nlocal defaultText = \"\".. price .. \" 方塊加速10秒\"\nbutton.Text = defaultText\n\nlocal function playTween(properties)\n        local info = TweenInfo.new(0.2, Enum.EasingStyle.Quint, Enum.EasingDirection.Out)\n        TweenService:Create(button, info, properties):Play()\nend\n\nbutton.MouseButton1Click:Connect(function()\n        local blocks = player:WaitForChild(\"leaderstats\")[\"方塊積分\"]\n\n        if blocks.Value >= price and button.Active then\n                blocks.Value -= price\n                button.Active = false -- 防止重複點擊\n                button.Text = \"⚡ 加速中...\"\n                button.BackgroundColor3 = Color3.fromRGB(0, 255, 100)\n\n                local hum = player.Character.Humanoid\n                hum.WalkSpeed = 32\n\n                task.wait(duration)\n\n                hum.WalkSpeed = 16\n                button.Active = true\n                button.Text = defaultText\n                button.BackgroundColor3 = Color3.fromRGB(0, 170, 255)\n        end\nend)"}, {"title": "8-5 跳躍力程式", "place": "放置位置：TextButton 按鈕內", "type": "類型：LocalScript", "purpose": "玩家消耗方塊積分後，短時間提高跳躍力，並在時間結束後恢復原狀。", "code": "local button = script.Parent\nlocal player = game.Players.LocalPlayer\nlocal TweenService = game:GetService(\"TweenService\")\n\n-- 初始化設定\nlocal price = 15\nlocal duration = 10\nlocal defaultText =  \"\".. price .. \" 方塊跳躍提升10秒\"\nbutton.Text = defaultText\nbutton.BackgroundColor3 = Color3.fromRGB(255, 170, 0) -- 橘色區分\n\nbutton.MouseButton1Click:Connect(function()\n        local blocks = player:WaitForChild(\"leaderstats\")[\"方塊積分\"]\n\n        if blocks.Value >= price and button.Active then\n                blocks.Value -= price\n                button.Active = false\n                button.Text = \"🆙 跳躍強化中...\"\n\n                local hum = player.Character.Humanoid\n                -- 💡 讓 Humanoid 使用 JumpPower 而非預設高度\n                hum.UseJumpPower = true \n                hum.JumpPower = 100 -- 預設是 50，設為 100 跳超高\n\n                task.wait(duration)\n\n                hum.JumpPower = 50 -- 恢復原狀\n                button.Active = true\n                button.Text = defaultText\n        end\nend)"}, {"title": "8-5 遊戲說明", "place": "放置位置：StarterGui 或 StarterPlayerScripts", "type": "類型：LocalScript", "purpose": "建立遊戲說明視窗，讓玩家按快捷鍵查看操作方式。", "code": "local player = game.Players.LocalPlayer\nlocal playerGui = player:WaitForChild(\"PlayerGui\")\nlocal UIS = game:GetService(\"UserInputService\")\n\n-- 1. 建立最外層容器，並放在玩家螢幕上 (playerGui)\nlocal gui = Instance.new(\"ScreenGui\")\ngui.Name = \"MinebloxGuideGui\"\ngui.ResetOnSpawn = false -- 玩家死掉重生時，介面不會消失\ngui.Parent = playerGui\n\n-- 建立主面板，設定大小、顏色，並預設隱藏\nlocal mainFrame = Instance.new(\"Frame\")\nmainFrame.Size = UDim2.new(0, 680, 0, 420)\nmainFrame.Position = UDim2.new(0.5, -340, 0.5, -210) -- 畫面正中央\nmainFrame.BackgroundColor3 = Color3.new(0.1, 0.1, 0.1)\nmainFrame.BackgroundTransparency = 0.2\nmainFrame.Visible = false -- 預設是關閉的\nmainFrame.Parent = gui\n\nlocal corner = Instance.new(\"UICorner\")\ncorner.CornerRadius = UDim.new(0, 15)\ncorner.Parent = mainFrame\n\n-- 標題列\nlocal title = Instance.new(\"TextLabel\")\ntitle.Size = UDim2.new(1, 0, 0, 50)\ntitle.BackgroundTransparency = 1\ntitle.Text = \"📖 Mineblox 生存與裝備指南 (按 E 鍵關閉)\"\ntitle.TextColor3 = Color3.new(1, 0.8, 0) -- 金黃色\ntitle.Font = Enum.Font.SourceSansBold\ntitle.TextSize = 28\ntitle.Parent = mainFrame\n\n-- 內容文字區 (使用換行符號 \\n 來排版)\nlocal content = Instance.new(\"TextLabel\")\ncontent.Size = UDim2.new(1, -40, 1, -70)\ncontent.Position = UDim2.new(0, 20, 0, 50)\ncontent.BackgroundTransparency = 1\ncontent.TextXAlignment = Enum.TextXAlignment.Left\ncontent.TextYAlignment = Enum.TextYAlignment.Top\ncontent.TextColor3 = Color3.new(1, 1, 1)\ncontent.Font = Enum.Font.SourceSansBold\ncontent.TextSize = 26\ncontent.RichText = true -- 開啟 RichText 才能使用顏色標籤\ncontent.Text = [[\n<b>【我的背包裝備】</b>\n<font color=\"rgb(100,255,100)\">🧱 建造工具：</font> 滑動切換 50 種方塊，具備虛影預覽與智慧對齊。\n<font color=\"rgb(200,200,200)\">⛏️ 破壞工具：</font> 瞄準方塊亮起紅框後，點擊敲碎並清理殘骸。\n<font color=\"rgb(255,100,100)\">💣 遙控炸彈：</font> 倒數後引發真實物理爆破與連鎖反應，會造成碎片流彈傷害。\n<font color=\"rgb(100,200,255)\">🏠 一鍵造屋：</font> 設定尺寸(最大50)，並可獨立自訂「XYZ三軸」方塊，一鍵生成！\n\n<b>【世界規則與操作提示】</b>\n1. <b>防卡頓機制：</b> 超大型建築會採用「掃描列印」方式分批生成，請耐心等待。\n2. <b>建築美學：</b> 一鍵造屋時，Y軸(天地)的優先權最高，會完美覆蓋周圍牆壁。\n3. <b>快捷鍵：</b> 使用鍵盤 <font color=\"rgb(255,255,0)\">數字鍵 1, 2, 3, 4</font> 快速切換手中裝備。\n                             \n                                   社團法人台灣資訊教育發展協會製作\n]]\ncontent.Parent = mainFrame\n\n-- 畫面右下角的提示小按鈕\nlocal hintButton = Instance.new(\"TextButton\")\nhintButton.Size = UDim2.new(0, 150, 0, 40)\nhintButton.Position = UDim2.new(1, -170, 1, -60)\nhintButton.BackgroundColor3 = Color3.new(0.2, 0.6, 1)\nhintButton.Text = \"📖 遊戲說明 (E)\"\nhintButton.TextColor3 = Color3.new(1, 1, 1)\nhintButton.Font = Enum.Font.SourceSansBold\nhintButton.TextSize = 20\nhintButton.Parent = gui\n\nlocal btnCorner = Instance.new(\"UICorner\")\nbtnCorner.CornerRadius = UDim.new(0, 8)\nbtnCorner.Parent = hintButton\n\n-- 2. 核心邏輯：開關切換 (Toggle)\nlocal isOpen = false\n\nlocal function toggleGuide()\n        isOpen = not isOpen -- 把狀態反轉\n        mainFrame.Visible = isOpen\nend\n\n-- 當玩家點擊右下角按鈕時觸發\nhintButton.MouseButton1Click:Connect(toggleGuide)\n\n-- 當玩家按下鍵盤 E 鍵時觸發\nUIS.InputBegan:Connect(function(input, isTyping)\n        if isTyping then return end -- 如果在聊天框打字就不理會\n\n        if input.KeyCode == Enum.KeyCode.E then\n                toggleGuide()\n        end\nend)"}];

let currentIndex = 0;

function escapeHTML(text) {
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function formatDescription(lesson) {
  return `<span class="section-label">功能說明：</span>\n${escapeHTML(lesson.purpose)}\n\n<span class="section-label">教學使用：</span>\n請先確認 Roblox Studio 的 Explorer 結構，將程式碼放到指定位置，再進行 Play 測試。`;
}

function toggleSidebar() {
  document.getElementById("mainLayout").classList.toggle("sidebar-collapsed");
}

function renderMenu() {
  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  lessons.forEach((lesson,index)=>{
    const btn = document.createElement("button");
    btn.className = "nav-btn" + (index === currentIndex ? " active" : "");
    btn.onclick = () => showLesson(index);
    btn.innerHTML = `
      <span class="nav-left">
        <span class="nav-num">${index + 1}</span>
        <span class="nav-text">${escapeHTML(lesson.title)}</span>
      </span>
      <span>›</span>
    `;
    menu.appendChild(btn);
  });
}

function renderCodeWithLineNumbers(code) {
  const box = document.getElementById("lessonCode");
  const lines = String(code).split("\n");
  box.innerHTML = lines.map((line, index) => {
    return `
      <div class="code-line">
        <span class="line-no">${index + 1}</span>
        <span class="line-code">${escapeHTML(line) || " "}</span>
      </div>
    `;
  }).join("");
}

function showLesson(index) {
  currentIndex = index;
  const lesson = lessons[index];

  document.getElementById("lessonTitle").innerText = lesson.title;
  document.getElementById("lessonDescription").innerHTML = formatDescription(lesson);
  document.getElementById("lessonPlace").innerText = lesson.place;
  document.getElementById("lessonType").innerText = lesson.type;
  document.getElementById("codeTitle").innerText = lesson.title + "｜程式碼";
  renderCodeWithLineNumbers(lesson.code);

  renderMenu();
}

function copyCurrentCode() {
  const code = lessons[currentIndex].code;
  if(navigator.clipboard) {
    navigator.clipboard.writeText(code).then(()=>{
      alert("程式碼已複製，可以貼到 Roblox Studio。");
    }).catch(()=>{
      fallbackCopy(code);
    });
  } else {
    fallbackCopy(code);
  }
}

function fallbackCopy(text) {
  const temp = document.createElement("textarea");
  temp.value = text;
  document.body.appendChild(temp);
  temp.select();
  try {
    document.execCommand("copy");
    alert("程式碼已複製，可以貼到 Roblox Studio。");
  } catch(e) {
    alert("無法自動複製，請手動選取程式碼。");
  }
  document.body.removeChild(temp);
}

renderMenu();
showLesson(0);
</script>
