<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox 程式碼滑動選單教學頁</title>
<style>
  :root{
    --orange:#ff8a00;
    --green:#22c55e;
    --dark:#111827;
    --dark2:#1f2937;
    --card:#ffffff;
    --text:#1f2937;
    --muted:#667085;
    --border:#e5e7eb;
    --code:#0f172a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;
    background:linear-gradient(135deg,#fff7ed,#ecfdf5,#eff6ff);
    color:var(--text);
  }
  .header{
    background:linear-gradient(135deg,var(--dark),var(--dark2));
    color:#fff;
    padding:18px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    font-weight:900;
    font-size:20px;
  }
  .logo{
    width:38px;
    height:38px;
    border-radius:12px;
    background:linear-gradient(135deg,var(--orange),var(--green));
    color:#111827;
    display:grid;
    place-items:center;
    font-weight:900;
  }
  .menu-toggle{
    border:0;
    border-radius:12px;
    background:var(--orange);
    color:#111827;
    padding:10px 14px;
    font-weight:900;
    cursor:pointer;
  }
  .layout{
    display:grid;
    grid-template-columns:300px 1fr;
    min-height:calc(100vh - 74px);
  }
  .sidebar{
    background:rgba(255,255,255,.96);
    border-right:1px solid var(--border);
    padding:16px;
    overflow:auto;
  }
  .sidebar-title{
    font-weight:900;
    color:var(--dark);
    margin-bottom:12px;
  }
  .nav-btn{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin:8px 0;
    padding:12px;
    border:1px solid var(--border);
    background:#fff;
    border-radius:14px;
    font-weight:900;
    color:var(--text);
    cursor:pointer;
    text-align:left;
  }
  .nav-btn:hover,.nav-btn.active{
    background:linear-gradient(135deg,#fff7ed,#ecfdf5);
    border-color:var(--orange);
  }
  .nav-left{
    display:flex;
    align-items:center;
    gap:8px;
    min-width:0;
  }
  .nav-num{
    width:26px;
    height:26px;
    border-radius:8px;
    background:var(--dark);
    color:white;
    display:grid;
    place-items:center;
    font-size:12px;
    flex-shrink:0;
  }
  .nav-text{
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
  }
  .content{
    padding:22px;
  }
  .hero{
    background:
      radial-gradient(circle at top left,rgba(255,138,0,.25),transparent 30%),
      radial-gradient(circle at top right,rgba(34,197,94,.24),transparent 30%),
      linear-gradient(135deg,#111827,#1f2937);
    color:white;
    border-radius:26px;
    padding:28px;
    box-shadow:0 16px 34px rgba(15,23,42,.18);
    margin-bottom:20px;
  }
  .hero h1{
    margin:0 0 10px;
    font-size:clamp(28px,4vw,44px);
  }
  .hero p{
    margin:0;
    color:rgba(255,255,255,.82);
    line-height:1.8;
    font-size:16px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:22px;
    box-shadow:0 12px 28px rgba(15,23,42,.08);
    overflow:hidden;
    margin-bottom:18px;
  }
  .lesson-body{
    padding:22px;
  }
  .lesson-body h2{
    margin:0 0 12px;
    font-size:28px;
    color:var(--dark);
  }
  .lesson-body p{
    line-height:1.85;
    white-space:pre-wrap;
    color:var(--muted);
    font-size:16px;
  }
  .meta{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:14px;
  }
  .tag{
    padding:8px 12px;
    background:#f3f4f6;
    border-radius:999px;
    font-size:13px;
    font-weight:900;
    color:#374151;
  }
  .code-head{
    background:var(--dark2);
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    padding:14px 16px;
  }
  .copy-btn{
    border:0;
    border-radius:10px;
    background:var(--green);
    color:#052e16;
    padding:8px 12px;
    font-weight:900;
    cursor:pointer;
  }
  pre{
    margin:0;
    background:var(--code);
    color:#e5e7eb;
    overflow:auto;
    padding:18px;
    max-height:520px;
    line-height:1.65;
    font-size:14px;
  }
  code{
    font-family:Consolas,Monaco,"Courier New",monospace;
  }
  .notice{
    background:#fff7ed;
    border-left:6px solid var(--orange);
    border-radius:14px;
    padding:14px 16px;
    color:#7c2d12;
    font-weight:800;
    line-height:1.7;
    margin-bottom:18px;
  }
  @media(max-width:860px){
    .layout{grid-template-columns:1fr;}
    .sidebar{display:none;border-right:0;border-bottom:1px solid var(--border);}
    .sidebar.open{display:block;}
    .content{padding:14px;}
    .hero{border-radius:20px;padding:22px;}
  }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand">
      <div class="logo">R</div>
      <div>Roblox 程式碼教學選單</div>
    </div>
    <button class="menu-toggle" onclick="toggleMenu()">☰ 開啟 / 關閉選單</button>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title">滑動選單</div>
      <div id="menu"></div>
    </aside>

    <main class="content">
      <section class="hero">
        <h1>Mineblox / Roblox 教學程式碼整理</h1>
        <p>
          將 Roblox Studio 裡不同 Script、LocalScript、ServerScript 分別整理成教學選單。
          學生可依照章節切換內容，閱讀說明後複製程式碼貼到指定位置。
        </p>
      </section>

      <div class="notice">
        修改方式：在 HTML 程式碼最下方找到 lessons，把每一個區塊的 title、place、description、code 改成你的內容即可。
      </div>

      <section class="card">
        <div class="lesson-body">
          <h2 id="lessonTitle"></h2>
          <p id="lessonDescription"></p>
          <div class="meta">
            <span class="tag" id="lessonPlace"></span>
            <span class="tag" id="lessonType"></span>
          </div>
        </div>

        <div class="code-head">
          <strong id="codeTitle">程式碼</strong>
          <button class="copy-btn" onclick="copyCurrentCode()">複製程式碼</button>
        </div>
        <pre><code id="lessonCode"></code></pre>
      </section>
    </main>
  </div>
</div>

<script>
/* =========================================================
   老師修改區
   你只要改這裡：
   title：左側選單名稱
   place：程式放置位置
   type：Script / LocalScript / ModuleScript
   description：教學說明
   code：要給學生複製的完整程式碼

   注意：
   code 使用反引號 `  ` 包住，多行程式碼可以直接貼上。
   如果你的程式碼本身有反引號 `，請改成一般引號或移除。
========================================================= */

const lessons = [
  {
    title: "交易系統",
    place: "放置位置：ServerScriptService",
    type: "類型：Script",
    description: `功能說明：
這裡放交易系統程式碼，用來處理玩家之間的交易邏輯。

教學提醒：
1. 先建立需要的 RemoteEvent。
2. 再放入 ServerScriptService。
3. 測試時建議使用多人測試模式。`,
    code: `-- 請將「交易系統」程式碼貼在這裡
print("交易系統啟動")`
  },
  {
    title: "MinebloxServer",
    place: "放置位置：ServerScriptService",
    type: "類型：Script",
    description: `功能說明：
伺服器主程式，負責接收玩家放置方塊、破壞方塊、建造房子、生成炸彈等請求。

教學提醒：
這支程式通常放在 ServerScriptService。`,
    code: `-- 請將 MinebloxServer 程式碼貼在這裡
local ReplicatedStorage = game:GetService("ReplicatedStorage")
print("Mineblox Server 啟動")`
  },
  {
    title: "方塊收集樣式",
    place: "放置位置：StarterGui 或 StarterPlayerScripts",
    type: "類型：LocalScript",
    description: `功能說明：
顯示方塊收集數量、任務提示或畫面 UI。

教學提醒：
與畫面有關的程式通常使用 LocalScript。`,
    code: `-- 請將「方塊收集樣式」程式碼貼在這裡
local player = game.Players.LocalPlayer
print(player.Name .. " 的方塊收集 UI 啟動")`
  },
  {
    title: "加速程式",
    place: "放置位置：StarterPlayer > StarterPlayerScripts",
    type: "類型：LocalScript",
    description: `功能說明：
讓玩家按下按鍵後加速，或調整玩家移動速度。

教學提醒：
如果是按鍵控制，通常需要 UserInputService。`,
    code: `-- 請將「加速程式」程式碼貼在這裡
local player = game.Players.LocalPlayer
print("加速程式啟動")`
  },
  {
    title: "跳躍力程式",
    place: "放置位置：StarterPlayer > StarterPlayerScripts",
    type: "類型：LocalScript",
    description: `功能說明：
控制玩家跳躍力，讓角色可以跳得更高。

教學提醒：
可修改 Humanoid.JumpPower 或 JumpHeight。`,
    code: `-- 請將「跳躍力程式」程式碼貼在這裡
local player = game.Players.LocalPlayer
print("跳躍力程式啟動")`
  },
  {
    title: "創世神之手程式",
    place: "放置位置：StarterPack Tool 或 StarterPlayerScripts",
    type: "類型：LocalScript / Script",
    description: `功能說明：
讓玩家像創世神一樣放置方塊、生成物件或觸發建造功能。

教學提醒：
如果要讓所有玩家看見方塊，需要搭配 RemoteEvent 送到伺服器。`,
    code: `-- 請將「創世神之手程式」貼在這裡
print("創世神之手啟動")`
  },
  {
    title: "鏟子程式",
    place: "放置位置：StarterPack > Tool",
    type: "類型：LocalScript / Script",
    description: `功能說明：
玩家使用鏟子破壞或收集方塊。

教學提醒：
工具類程式通常放在 Tool 裡面。`,
    code: `-- 請將「鏟子程式」貼在這裡
print("鏟子工具啟動")`
  },
  {
    title: "建造器程式",
    place: "放置位置：StarterPack > Tool 或 ServerScriptService",
    type: "類型：Script / LocalScript",
    description: `功能說明：
一鍵生成房子、牆壁、道路或指定建築。

教學提醒：
大量生成物件建議由伺服器處理。`,
    code: `-- 請將「建造器程式」貼在這裡
print("建造器啟動")`
  },
  {
    title: "炸彈程式",
    place: "放置位置：StarterPack > Tool 或 ServerScriptService",
    type: "類型：Script / LocalScript",
    description: `功能說明：
生成炸彈、倒數、爆炸與破壞範圍效果。

教學提醒：
爆炸效果建議在 ServerScriptService 處理，避免不同玩家畫面不同步。`,
    code: `-- 請將「炸彈程式」貼在這裡
print("炸彈程式啟動")`
  },
  {
    title: "遊戲說明",
    place: "放置位置：StarterGui",
    type: "類型：LocalScript",
    description: `功能說明：
顯示玩家操作說明、任務目標與遊戲玩法。

教學提醒：
畫面 UI 建議放在 StarterGui。`,
    code: `-- 請將「遊戲說明」程式碼貼在這裡
local player = game.Players.LocalPlayer
local playerGui = player:WaitForChild("PlayerGui")
print("遊戲說明 UI 啟動")`
  }
];

let currentIndex = 0;

function escapeHTML(text){
  return String(text)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function renderMenu(){
  const menu = document.getElementById("menu");
  menu.innerHTML = "";

  lessons.forEach((lesson,index)=>{
    const btn = document.createElement("button");
    btn.className = "nav-btn" + (index === currentIndex ? " active" : "");
    btn.onclick = () => showLesson(index);
    btn.innerHTML = `
      <span class="nav-left">
        <span class="nav-num">${index + 1}</span>
        <span class="nav-text">${escapeHTML(lesson.title)}</span>
      </span>
      <span>›</span>
    `;
    menu.appendChild(btn);
  });
}

function showLesson(index){
  currentIndex = index;
  const lesson = lessons[index];

  document.getElementById("lessonTitle").innerText = lesson.title;
  document.getElementById("lessonDescription").innerText = lesson.description;
  document.getElementById("lessonPlace").innerText = lesson.place;
  document.getElementById("lessonType").innerText = lesson.type;
  document.getElementById("codeTitle").innerText = lesson.title + "｜程式碼";
  document.getElementById("lessonCode").innerText = lesson.code;

  renderMenu();

  if(window.innerWidth <= 860){
    document.getElementById("sidebar").classList.remove("open");
  }
}

function copyCurrentCode(){
  const code = lessons[currentIndex].code;
  if(navigator.clipboard){
    navigator.clipboard.writeText(code).then(()=>{
      alert("程式碼已複製，可以貼到 Roblox Studio。");
    }).catch(()=>{
      alert("無法自動複製，請手動選取程式碼。");
    });
  }else{
    alert("此瀏覽器不支援自動複製，請手動選取程式碼。");
  }
}

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("open");
}

renderMenu();
showLesson(0);
</script>
</body>
</html>
